<!DOCTYPE html>
<html>
<head>
<title>Register - MahaNivas</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 0;
}

.container{
    width:420px;
    border:1px solid #e0e0e0;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

.header{
    background:#004aad;
    color:white;
    padding:18px;
    text-align:center;
    font-size:20px;
}

.body{
    padding:30px;
}

.input-group{
    position:relative;
    margin-bottom:22px;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    outline:none;
    transition:0.3s;
}

.input-group input:focus{
    border-color:#004aad;
}

.input-group label{
    position:absolute;
    top:12px;
    left:12px;
    color:#777;
    transition:0.3s;
    background:white;
    padding:0 4px;
}

.input-group input:focus + label,
.input-group input:valid + label{
    top:-8px;
    font-size:12px;
    color:#004aad;
}

/* Custom File Upload */

.file-wrapper{
    margin-bottom:22px;
}

.custom-file{
    display:block;
    border:1px solid #ccc;
    padding:12px;
    cursor:pointer;
    color:#777;
    transition:0.3s;
}

.custom-file:hover{
    border-color:#004aad;
    color:#004aad;
}

#preview{
    margin-top:10px;
    width:100px;
    height:100px;
    object-fit:cover;
    display:none;
    border:1px solid #ddd;
}

/* Button */

button{
    width:100%;
    padding:12px;
    background:#004aad;
    color:white;
    border:none;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#003080;
}

/* Error Message */

.error{
    color:red;
    font-size:13px;
    margin-bottom:12px;
}

/* Login Link */

.link{
    text-align:center;
    margin-top:18px;
    font-size:14px;
}

.link a{
    color:#004aad;
    text-decoration:none;
    font-weight:500;
}

.link a:hover{
    text-decoration:underline;
}
</style>
</head>
<body>

<div class="container">
<div class="header">Create MahaNivas Account</div>

<div class="body">

{% for message in messages %}
<div class="error">{{ message }}</div>
{% endfor %}

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="input-group">
<input type="text" name="first_name" required>
<label>First Name</label>
</div>

<div class="input-group">
<input type="text" name="last_name" required>
<label>Last Name</label>
</div>

<div class="input-group">
<input type="text" name="username" required>
<label>Username</label>
</div>

<div class="input-group">
<input type="email" name="email" required>
<label>Email</label>
</div>

<div class="input-group">
<input type="text" name="contact" required>
<label>Contact No</label>
</div>

<!-- Custom File Upload -->
<div class="file-wrapper">

<label class="custom-file">
    Add Profile Image
    <input type="file" name="profile_image" id="profileImage" accept="image/*" hidden required>
</label>

<img id="preview">

</div>

<div class="input-group">
<input type="password" name="password" required>
<label>Password</label>
</div>

<div class="input-group">
<input type="password" name="confirm_password" required>
<label>Confirm Password</label>
</div>

<button type="submit">Register</button>

</form>

<div class="link">
Already have an account? <a href="{% url 'login' %}">Login</a>
</div>

</div>
</div>

<script>
const fileInput = document.getElementById("profileImage");
const preview = document.getElementById("preview");

fileInput.addEventListener("change", function(){
    const file = this.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(){
            preview.src = reader.result;
            preview.style.display = "block";
        }
        reader.readAsDataURL(file);
    }
});
</script>

</body>
</html>
