{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Book Room | MahaNivas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family:'Segoe UI';
    background:#f4f8ff;
    padding:40px;
}
.form-card{
    background:white;
    padding:40px;
    border-radius:15px;
    max-width:700px;
    margin:auto;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
h3{
    color:#004aad;
    margin-bottom:15px;
}
.form-group{
    margin-bottom:20px;
}
label{
    font-weight:600;
}
input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #ccc;
}
.total-box{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
    color:#004aad;
}
button{
    width:100%;
    padding:15px;
    margin-top:20px;
    background:#004aad;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background:#002c7a;
}
.cancel-btn{
    display:inline-block;
    text-decoration:none;
    background:#ff5722;
    color:white;
    padding:10px 15px;
    border-radius:5px;
    margin-top:10px;
}
</style>
</head>
<body>
{% if messages %}
    {% for message in messages %}
        <p style="color:red;">{{ message }}</p>
    {% endfor %}
{% endif %}
<div class="form-card">
<h3>Room: {{ room.title }}</h3>
<h3>Monthly Rent: ₹ {{ room.price }}</h3>

<form method="POST" id="bookingForm">
{% csrf_token %}

<div class="form-group">
    <label>Booking Person Name</label>
    <input type="text" name="booking_name" required>
</div>

<div class="form-group">
    <label>Number of People</label>
    <input type="number" name="people_count" min="1" required>
</div>

<div class="form-group">
    <label>From Date</label>
    <input type="date" name="from_date" id="from_date" required>
</div>

<div class="form-group">
    <label>To Date</label>
    <input type="date" name="to_date" id="to_date" required>
</div>

<div class="form-group">
    <label>Aadhaar Number (12 digits)</label>
    <input type="text" name="aadhaar" pattern="[0-9]{12}" maxlength="12" required>
</div>

<div class="form-group">
    <label>Mobile Number (10 digits)</label>
    <input type="text" name="mobile" pattern="[0-9]{10}" maxlength="10" required>
</div>

<input type="hidden" name="total_amount" id="total_amount">

<div class="total-box">
    Total Cost: ₹ <span id="total_cost">0</span>
</div>

<button type="submit">Confirm Booking</button>
<a href="{% url 'view_room' room.id %}" class="cancel-btn">Cancel</a>

</form>
</div>

<script>
const monthlyPrice = {{ room.price }};
const fromDate = document.getElementById("from_date");
const toDate = document.getElementById("to_date");
const totalCost = document.getElementById("total_cost");
const totalAmount = document.getElementById("total_amount");

function calculateCost(){
    if(fromDate.value && toDate.value){
        const start = new Date(fromDate.value);
        const end = new Date(toDate.value);
        const diffTime = end - start;
        const diffDays = diffTime / (1000 * 60 * 60 * 24);
        const months = diffDays / 30;
        const total = Math.round(months * monthlyPrice);
        totalCost.innerText = total;
        totalAmount.value = total;
    }
}

fromDate.addEventListener("change", calculateCost);
toDate.addEventListener("change", calculateCost);

// Optional JS check before submitting
document.getElementById("bookingForm").addEventListener("submit", function(e){
    {% if not room.is_available %}
    e.preventDefault();
    alert("This room is already booked!");
    window.location.href="{% url 'already_booked' %}";
    {% endif %}
});
</script>

</body>
</html>
